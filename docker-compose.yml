version: '3.8'

services:
  # 1. The Python ML Engine
  ml-service:
    build: ./ml-service
    container_name: tedd-ml-service
    expose:
      - "${ML_PORT}"
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}

  # 2. The Node.js Backend
  server:
    build: ./server
    container_name: tedd-server
    ports:
      - "${PORT}:${PORT}"
    environment:
      DATABASE_URL: ${DATABASE_URL} 
      PORT: ${PORT}
      CLIENT_URL: ${CLIENT_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ML_SERVICE_URL: ${ML_SERVICE_URL}
      GENAI_SERVICE_URL: ${GENAI_SERVICE_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - ml-service
      - genai-service

  # 3. The React Frontend
  client:
    build:
      context: . # Use the root as context so it can see the root .env
      dockerfile: client/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL} # Pass the variable into the build
    container_name: tedd-client
    ports:
      - "${VITE_PORT}:80"
    # Keep your environment section for safety, but args does the heavy lifting
    environment:
      VITE_API_URL: ${VITE_API_URL} 
    depends_on:
      - server

  genai-service:
    build: ./genai-service
    container_name: tedd-genai-service
    ports:
      - "${GEN_AI_PORT}:${GEN_AI_PORT}"
    environment:
      - GEN_AI_PORT=${GEN_AI_PORT}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    # Allows the container to talk to Ollama running on your host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # 4. Cloudflare Post-Quantum Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tedd-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - client