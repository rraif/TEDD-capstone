version: '3.8'

services:
  # 1. The Python ML Engine
  ml-service:
    build: ./ml-service
    container_name: tedd-ml-service
    ports:
      - "${ML_PORT}:${ML_PORT}"
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}

  # 2. The Node.js Backend
  server:
    build: ./server
    container_name: tedd-server
    ports:
      - "${PORT}:${PORT}"
    environment:
      DATABASE_URL: ${DATABASE_URL} 
      PORT: ${PORT}
      CLIENT_URL: ${CLIENT_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ML_SERVICE_URL: ${ML_SERVICE_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - ml-service

  # 3. The React Frontend
  client:
    build: ./client
    container_name: tedd-client
    ports:
      - "${VITE_PORT}:${VITE_PORT}"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - server

  # 4. Cloudflare Post-Quantum Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tedd-tunnel
    command: tunnel --url http://client:${VITE_PORT}
    # environment:
    #   - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - client
      - server