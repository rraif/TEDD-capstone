server {
    listen 80;

    # 🚀 SECURITY HEADERS
    # HSTS (Enforce HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # CSP (Matches your Helmet config)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://theemaildangersdetector.tech; frame-ancestors 'none'; object-src 'none';" always;

    # Standard Hardening
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 1. Frontend Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    # 2. Backend API
    # 🚀 Reverted to 5000 to match your working setup
    location /api/ {
        proxy_pass http://server:5000/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Google Auth
    # 🚀 Reverted to 5000 to match your working setup
    location /auth/ {
        proxy_pass http://server:5000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check for Docker/Cloudflare
    location = /health {
        access_log off;
        return 200 'OK';
    }
}